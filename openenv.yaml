name: financial-analysis-env
version: 0.1.0
spec_version: 1
entrypoint: server.financial_analysis_environment:FinancialAnalysisOpenEnv
description: >-
  RL environment for training agents to analyze financial data.
  Tasks range from quarterly trend analysis (easy) to full risk
  assessments for Series B fundraising (hard). Each task has a
  programmatic grader with deterministic success criteria and
  partial progress signals.
author: ishikatyagi-star
license: MIT
tags:
  - openenv
  - financial-analysis
  - agent-benchmark

tasks:
  - id: easy
    name: "Revenue Trend Analysis"
    description: "Identify the top-performing quarter and calculate percentage growth from Q1 to Q2."
    difficulty: "easy"
    grader: financial_analysis_env.environment:grade_easy
  - id: medium
    name: "Expense Anomaly Detection"
    description: "Detect a significant spike in monthly OPEX and recommend audit steps."
    difficulty: "medium"
    grader: financial_analysis_env.environment:grade_medium
  - id: hard
    name: "Series B Risk Assessment"
    description: "Perform a multi-dimensional analysis of CAC, margins, and OPEX growth."
    difficulty: "hard"
    grader: financial_analysis_env.environment:grade_hard
  - id: expert
    name: "Cash Runway & Covenant Audit"
    description: "Calculate runway and evaluate debt covenant risks based on starting cash and burn rate."
    difficulty: "expert"
    grader: financial_analysis_env.environment:grade_expert

metadata:
  domain: financial_analysis
  max_turns: 1
  reward_range: [0.01, 0.99]
  episode_length: 1
  task_progression:
    easy: quarterly revenue analysis with straightforward data
    medium: expense anomaly detection with monthly data patterns
    hard: comprehensive Series B risk assessment with multi-dimensional data
    expert: cash flow runway and debt coverage assessment
  observation_fields:
    - task_description
    - financial_data
    - difficulty
    - done
    - reward
  action_fields:
    - analysis
    - identified_issues
    - recommendation